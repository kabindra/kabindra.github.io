<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepali New Year 2083</title>
    <meta name="description"
        content="A Nepali New Year 2083 celebration page with Everest-inspired design and RSVP details.">
    <meta property="og:title" content="Nepali New Year 2083">
    <meta property="og:description"
        content="Celebrate Nepali New Year 2083 with a beautifully designed invitation page.">
    <meta property="og:image" content="social-preview.jpg">
    <meta property="og:url" content="https://kabindra.com.np/newyear2083/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Nepali New Year 2083">
    <meta name="twitter:description"
        content="Celebrate Nepali New Year 2083 with a beautifully designed invitation page.">
    <meta name="twitter:image" content="social-preview.jpg">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700;800;900&family=Noto+Serif+Devanagari:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        .card {
            width: 560px;
            height: 760px;
            position: relative;
            overflow: hidden;
            border-radius: 6px;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        /* ── Everest SVG Background ── */
        .bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* Sky gradient */
        .sky {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                    #0a1628 0%,
                    #0d2140 12%,
                    #1a3a6e 28%,
                    #2352a0 44%,
                    #4a7ec8 60%,
                    #7baad8 72%,
                    #b8d4ec 82%,
                    #deeaf5 90%,
                    #eef5fa 100%);
        }

        /* Stars */
        .stars {
            position: absolute;
            inset: 0;
            height: 55%;
        }

        /* Snow glow at horizon */
        .horizon-glow {
            position: absolute;
            bottom: 38%;
            left: 0;
            right: 0;
            height: 180px;
            background: radial-gradient(ellipse 80% 100% at 50% 100%, rgba(255, 240, 200, 0.25) 0%, transparent 70%);
        }

        /* Overlay for readability */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                    rgba(5, 10, 25, 0.55) 0%,
                    rgba(5, 10, 25, 0.2) 38%,
                    rgba(5, 10, 25, 0.1) 55%,
                    rgba(5, 10, 25, 0.55) 72%,
                    rgba(5, 10, 25, 0.92) 100%);
            z-index: 3;
        }

        /* ── Prayer Flags ── */
        .flags-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 4;
            height: 90px;
            pointer-events: none;
        }

        .flag-string {
            position: absolute;
            top: 0;
            left: -10px;
            right: -10px;
            height: 90px;
        }

        .flag-line {
            position: absolute;
            top: 6px;
            left: 0;
            right: 0;
            height: 1.5px;
            background: rgba(180, 140, 80, 0.6);
        }

        .flag {
            position: absolute;
            top: 0;
            width: 32px;
            height: 42px;
            clip-path: polygon(0 0, 100% 0, 100% 82%, 50% 100%, 0 82%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.3px;
            animation: sway 3s ease-in-out infinite;
            transform-origin: top center;
            text-align: center;
            line-height: 1.1;
            padding-top: 4px;
            font-family: 'Noto Serif Devanagari', serif;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
        }

        @keyframes sway {

            0%,
            100% {
                transform: rotate(-2deg) skewX(1deg);
            }

            50% {
                transform: rotate(2deg) skewX(-1deg);
            }
        }

        /* Flag colors: blue, white, red, green, yellow — Lungta/Tibetan pattern */
        .flag:nth-child(5n+1) {
            background: #1a5cb8;
            animation-delay: 0s;
        }

        .flag:nth-child(5n+2) {
            background: #e8e8e8;
            color: rgba(30, 30, 30, 0.9);
            animation-delay: 0.3s;
        }

        .flag:nth-child(5n+3) {
            background: #c0272d;
            animation-delay: 0.6s;
        }

        .flag:nth-child(5n+4) {
            background: #2e7d32;
            animation-delay: 0.9s;
        }

        .flag:nth-child(5n+5) {
            background: #f9a825;
            color: rgba(50, 30, 0, 0.9);
            animation-delay: 1.2s;
        }

        /* Second string offset */
        .flag-string-2 .flag {
            animation-delay: 0.15s;
        }

        .flag-string-2 .flag:nth-child(5n+1) {
            animation-delay: 0.15s;
        }

        .flag-string-2 .flag:nth-child(5n+2) {
            animation-delay: 0.45s;
        }

        .flag-string-2 .flag:nth-child(5n+3) {
            animation-delay: 0.75s;
        }

        .flag-string-2 .flag:nth-child(5n+4) {
            animation-delay: 1.05s;
        }

        .flag-string-2 .flag:nth-child(5n+5) {
            animation-delay: 1.35s;
        }

        /* ── Main Content ── */
        .content {
            position: absolute;
            inset: 0;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Center title block */
        .title-block {
            text-align: center;
            padding: 0 30px;
            animation: fadeUp 1s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .year-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #f0c060;
            border: 1px solid rgba(240, 192, 96, 0.5);
            padding: 5px 18px;
            border-radius: 2px;
            margin-bottom: 24px;
            backdrop-filter: blur(4px);
            background: rgba(0, 0, 0, 0.2);
        }

        .nepali-text {
            font-family: 'Noto Serif Devanagari', serif;
            font-size: 38px;
            font-weight: 700;
            color: #ffffff;
            text-shadow:
                0 0 60px rgba(255, 200, 80, 0.5),
                0 2px 20px rgba(0, 0, 0, 0.8);
            letter-spacing: 2px;
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .english-main {
            font-size: 36px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
            line-height: 1.1;
            text-transform: uppercase;
            text-shadow: 0 2px 30px rgba(0, 0, 0, 0.7);
        }

        .english-main span {
            color: #f0c060;
        }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            font-style: italic;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.75);
            letter-spacing: 2px;
            margin-top: 14px;
        }

        /* Thin gold rule */
        .rule {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #f0c060, transparent);
            margin: 18px auto;
        }

        /* ── Bottom Info Bar ── */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 6;
            padding: 28px 40px 32px;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.6) 70%, transparent 100%);
            animation: fadeUp 1.2s 0.3s ease both;
        }

        .bottom-inner {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            border-top: 1px solid rgba(240, 192, 96, 0.25);
            padding-top: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .info-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #f0c060;
            opacity: 0.8;
        }

        .info-value {
            font-size: 17px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.3px;
        }

        .info-sub {
            font-size: 12px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.3px;
        }

        .center-emblem {
            font-size: 32px;
            filter: drop-shadow(0 0 10px rgba(240, 192, 96, 0.6));
            flex-shrink: 0;
        }

        /* ── Everest Mountain SVG (inline) ── */
        .mountain-svg {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            z-index: 2;
        }

        /* RSVP button */
        .rsvp-btn {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 28px;
            background: transparent;
            border: 1.5px solid rgba(240, 192, 96, 0.7);
            border-radius: 2px;
            color: #f0c060;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: background .2s, color .2s;
            position: relative;
            z-index: 10;
        }

        .rsvp-btn:hover {
            background: rgba(240, 192, 96, 0.15);
            color: #fff;
        }

        .rsvp-creating {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Star field via JS */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--d, 3s) ease-in-out infinite;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: var(--o1, 0.8);
            }

            50% {
                opacity: var(--o2, 0.2);
            }
        }
    </style>
</head>

<body>
    <div class="card">

        <!-- Sky -->
        <div class="sky"></div>

        <!-- Stars canvas -->
        <div class="stars" id="stars"></div>

        <!-- Horizon glow -->
        <div class="horizon-glow"></div>

        <!-- Everest SVG -->
        <svg class="mountain-svg" viewBox="0 0 560 400" preserveAspectRatio="xMidYMax meet"
            xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Snow gradient -->
                <linearGradient id="snowGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#ffffff" />
                    <stop offset="40%" stop-color="#e8eef5" />
                    <stop offset="100%" stop-color="#c5d5e8" />
                </linearGradient>
                <!-- Rock gradient -->
                <linearGradient id="rockGrad" x1="0" y1="0" x2="0.3" y2="1">
                    <stop offset="0%" stop-color="#5a6a7a" />
                    <stop offset="50%" stop-color="#3a4555" />
                    <stop offset="100%" stop-color="#1e2530" />
                </linearGradient>
                <!-- Rock right shadow -->
                <linearGradient id="rockDark" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="#3a4555" />
                    <stop offset="100%" stop-color="#1a1e28" />
                </linearGradient>
                <!-- Far ridges -->
                <linearGradient id="ridge1" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#7a8fa8" />
                    <stop offset="100%" stop-color="#4a5a70" />
                </linearGradient>
                <linearGradient id="ridge2" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#5a6e88" />
                    <stop offset="100%" stop-color="#2a3545" />
                </linearGradient>
                <!-- Glacier -->
                <linearGradient id="glacier" x1="0" y1="0" x2="0.2" y2="1">
                    <stop offset="0%" stop-color="#d0dff0" />
                    <stop offset="100%" stop-color="#8aabcc" />
                </linearGradient>
                <!-- Wind plume -->
                <linearGradient id="plumeGrad" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="rgba(255,255,255,0.85)" />
                    <stop offset="100%" stop-color="rgba(255,255,255,0)" />
                </linearGradient>
                <filter id="blur1">
                    <feGaussianBlur stdDeviation="1.5" />
                </filter>
                <filter id="blur2">
                    <feGaussianBlur stdDeviation="3" />
                </filter>
            </defs>

            <!-- Distant right range -->
            <path d="M320 260 L380 170 L420 200 L460 140 L500 180 L540 155 L580 190 L580 400 L320 400Z"
                fill="url(#ridge2)" opacity="0.6" />

            <!-- Distant left range -->
            <path d="M-20 310 L30 230 L70 260 L110 195 L155 235 L190 200 L230 240 L260 220 L300 260 L300 400 L-20 400Z"
                fill="url(#ridge1)" opacity="0.55" />

            <!-- Mid ridges left -->
            <path d="M-20 340 L20 280 L55 300 L90 255 L125 275 L160 245 L195 270 L220 255 L250 280 L270 400 L-20 400Z"
                fill="#3a4a60" opacity="0.7" />

            <!-- Mid ridges right -->
            <path
                d="M290 400 L310 270 L345 295 L370 255 L405 285 L435 248 L468 272 L490 255 L520 280 L560 265 L560 400Z"
                fill="#303a50" opacity="0.7" />

            <!-- MAIN EVEREST — Left rock face -->
            <path
                d="M200 400 L240 290 L265 270 L280 240 L290 200 L300 168 L310 142 L318 118 L320 100 L322 118 L326 145 L332 168 L340 200 L350 235 L360 260 L375 285 L390 310 L420 360 L440 400Z"
                fill="url(#rockGrad)" />

            <!-- Left snow shoulder -->
            <path d="M240 290 L265 270 L280 240 L290 210 L300 182 L306 158 L312 132 L316 110 L319 96
             L316 118 L310 145 L300 175 L292 205 L282 235 L268 265 L252 282 L238 292Z" fill="url(#snowGrad)"
                opacity="0.9" />

            <!-- Right rock face (darker) -->
            <path
                d="M320 100 L322 118 L326 145 L332 168 L340 200 L350 235 L365 268 L380 295 L400 330 L440 400 L200 400 L200 400Z"
                fill="url(#rockDark)" opacity="0.85" />

            <!-- Right snow face -->
            <path d="M320 100 L322 120 L325 145 L329 165 L334 192 L340 218 L346 240 L354 260 L362 278 L370 292
             L362 278 L353 258 L344 235 L337 210 L330 185 L325 160 L322 138 L320 115Z" fill="url(#snowGrad)"
                opacity="0.75" />

            <!-- Summit cap snow -->
            <path d="M315 105 L318 92 L320 80 L322 92 L325 108 L322 102 L320 94 L318 102Z" fill="white"
                opacity="0.95" />

            <!-- Glacier left -->
            <path d="M265 268 L278 245 L288 218 L294 240 L288 265 L278 282Z" fill="url(#glacier)" opacity="0.6" />

            <!-- Glacier right -->
            <path d="M330 188 L338 215 L344 240 L336 245 L328 218 L322 192Z" fill="url(#glacier)" opacity="0.5" />

            <!-- Snow shadow crease left -->
            <path d="M280 240 L290 205 L298 175 L302 155 L298 178 L290 208 L280 242Z" fill="rgba(100,140,190,0.3)" />

            <!-- Wind plume from summit -->
            <path d="M320 82 Q340 72 370 68 Q400 64 440 67 Q400 70 370 76 Q345 80 325 86Z" fill="url(#plumeGrad)"
                opacity="0.7" filter="url(#blur1)" />
            <path d="M320 86 Q348 78 385 75 Q420 72 460 74 Q420 78 384 82 Q348 86 322 90Z" fill="url(#plumeGrad)"
                opacity="0.4" filter="url(#blur1)" />

            <!-- Lhotse left neighbor -->
            <path
                d="M160 400 L190 320 L205 295 L215 268 L222 248 L230 235 L238 248 L244 270 L252 295 L262 318 L272 350 L280 400Z"
                fill="#3a4858" opacity="0.9" />
            <path d="M222 248 L228 235 L234 248 L230 260 L225 250Z" fill="url(#snowGrad)" opacity="0.7" />

            <!-- Nuptse right neighbor -->
            <path
                d="M360 400 L375 330 L385 305 L395 280 L405 258 L414 240 L422 258 L428 278 L435 305 L445 330 L460 400Z"
                fill="#323e50" opacity="0.9" />
            <path d="M414 240 L420 228 L426 242 L422 256 L416 244Z" fill="url(#snowGrad)" opacity="0.65" />

            <!-- Foreground base -->
            <path d="M0 390 Q140 370 280 375 Q420 380 560 368 L560 400 L0 400Z" fill="#1a2030" />

            <!-- Snow patches on base -->
            <ellipse cx="100" cy="390" rx="40" ry="8" fill="white" opacity="0.12" />
            <ellipse cx="430" cy="385" rx="35" ry="7" fill="white" opacity="0.1" />

            <!-- Atmospheric haze layer -->
            <rect x="0" y="300" width="560" height="80" fill="url(#ridge1)" opacity="0.06" filter="url(#blur2)" />
        </svg>

        <!-- Dark overlay for readability -->
        <div class="overlay"></div>

        <!-- Prayer Flags Top -->
        <div class="flags-container">
            <!-- String 1: full width -->
            <div class="flag-string" id="flagString1">
                <div class="flag-line"></div>
            </div>
            <!-- String 2: offset -->
            <div class="flag-string flag-string-2" style="top:44px;" id="flagString2">
                <div class="flag-line"></div>
            </div>
        </div>

        <!-- CENTER CONTENT -->
        <div class="content">
            <div class="title-block">
                <div class="year-badge">Bikram Sambat · २०८३</div>

                <div class="nepali-text">नव वर्षको शुभकामना</div>

                <div class="rule"></div>

                <div class="english-main">Happy Nepali<br><span>New Year</span> 2083</div>

                <div class="tagline">Celebrating togetherness & new beginnings</div>
            </div>
        </div>

        <!-- BOTTOM BAR -->
        <div class="bottom-bar">
            <div class="bottom-inner">
                <div class="info-item">
                    <span class="info-label">Date</span>
                    <span class="info-value">Sunday, April 12</span>
                    <span class="info-sub">2026</span>
                </div>
                <div class="center-emblem">🪔</div>
                <div class="info-item" style="text-align:right;">
                    <span class="info-label">Venue</span>
                    <span class="info-value">Blackwell North Shelter</span>
                    <span class="info-sub">Warrenville, Illinois</span>
                </div>
            </div>
            <div style="text-align:center; padding-bottom: 4px;">
                <a id="rsvpBtn" class="rsvp-btn" href="https://docs.google.com/spreadsheets/d/1e-LAk6h9SVo6XPDOsIOX2BFRgMd77SpSHVbbGbgiiYQ/edit?usp=sharing" target="_blank">RSVP Here</a>
            </div>

        </div>

    </div>

    <script>
        // Generate stars
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 90; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2 + 0.5;
            const o1 = (Math.random() * 0.5 + 0.4).toFixed(2);
            const o2 = (Math.random() * 0.2 + 0.05).toFixed(2);
            const dur = (Math.random() * 3 + 2).toFixed(1);
            s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random() * 100}%;
    top:${Math.random() * 100}%;
    --d:${dur}s; --o1:${o1}; --o2:${o2};
    animation-delay:${(Math.random() * 4).toFixed(1)}s;
  `;
            starsEl.appendChild(s);
        }

        // Generate prayer flags
        const flagSymbols = ['☸', 'ॐ', '✦', '❁', '卍', '☸', 'ॐ', '✦'];
        const flagColors5 = ['blue', 'white', 'red', 'green', 'yellow'];

        function buildFlagString(containerId, count, startLeft) {
            const container = document.getElementById(containerId);
            const spacing = 580 / (count - 1);
            for (let i = 0; i < count; i++) {
                const f = document.createElement('div');
                f.className = 'flag';
                f.style.left = (startLeft + i * spacing - 16) + 'px';
                f.textContent = flagSymbols[i % flagSymbols.length];
                container.appendChild(f);
            }
        }

        buildFlagString('flagString1', 15, 0);
        buildFlagString('flagString2', 13, 20);
    </script>
</body>

</html>
