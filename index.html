<head>

  <meta property="og:description" content="Lead Full Stack Developer at Hub Group with a polished personal homepage.">

  <meta property="og:type" content="website">

  <meta name="twitter:description" content="Lead Full Stack Developer at Hub Group with a polished personal homepage.">

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link

    rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      font-family: 'Montserrat', sans-serif;
      background: #0a0a0a;
      color: #f4f4f4;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      background: #0a0a0a;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .sky {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg,
          #0a1628 0%,
          #0d2140 12%,
          #1a3a6e 28%,
          #2352a0 44%,
          #4a7ec8 60%,
          #7baad8 72%,
          #b8d4ec 82%,
          #deeaf5 90%,
          #eef5fa 100%);
      z-index: -4;
    }

    .stars {
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
    }

    .horizon-glow {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 44%;
      height: 200px;
      background: radial-gradient(ellipse 80% 100% at 50% 100%, rgba(255, 240, 200, 0.27) 0%, transparent 72%);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg,
          rgba(5, 10, 25, 0.45) 0%,
          rgba(5, 10, 25, 0.15) 42%,
          rgba(5, 10, 25, 0.05) 55%,
          rgba(5, 10, 25, 0.5) 75%,
          rgba(5, 10, 25, 0.95) 100%);
      z-index: -1;
    }

    .content {
      position: relative;
      max-width: 1080px;
      margin: 0 auto;
      padding: 72px 24px 120px;
      display: grid;
      gap: 48px;
    }

    .hero {
      padding: 48px 36px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      background: rgba(3, 8, 25, 0.68);
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(3rem, 5vw, 5rem);
      letter-spacing: -0.06em;
      line-height: 0.96;
      color: #fff;
    }

    .hero p.lead {
      margin: 0 0 24px;
      max-width: 720px;
      font-size: 1.12rem;
      color: #e7e7e7;
      line-height: 1.8;
    }

    .hero .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(240, 192, 96, 0.6);
      background: rgba(255, 255, 255, 0.08);
      color: #f0c060;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .timeline {
      display: grid;
      gap: 24px;
    }

    .timeline-card {
      position: relative;
      padding: 28px 32px;
      border-radius: 24px;
      background: rgba(8, 12, 24, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.24);
      overflow: hidden;
    }

    .timeline-card::before {
      content: '';
      position: absolute;
      left: 32px;
      top: 24px;
      width: 4px;
      height: calc(100% - 48px);
      background: linear-gradient(180deg, #f0c060, rgba(240, 192, 96, 0.2));
      border-radius: 999px;
      opacity: 0.95;
    }

    .timeline-card .marker {
      position: absolute;
      left: 22px;
      top: 22px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #f0c060;
      border: 3px solid rgba(255, 255, 255, 0.2);
    }

    .timeline-card h2 {
      margin: 0 0 12px;
      font-size: 1.75rem;
      letter-spacing: -0.03em;
      color: #fff;
    }

    .timeline-card p {
      margin: 0;
      color: rgba(242, 242, 242, 0.88);
      line-height: 1.8;
    }

    .timeline-card .meta {
      display: block;
      margin: 12px 0 18px;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.72);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .section-title {
      font-size: 1.25rem;
      color: #f0c060;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-subtitle {
      font-size: 1rem;
      max-width: 720px;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.7;
    }

    .mountain-svg {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      z-index: -5;
      pointer-events: none;
    }

    @media (max-width: 800px) {

      .hero,
      .timeline-card {
        padding: 24px;
      }

      .timeline-card::before {
        left: 20px;
      }

      .timeline-card .marker {
        left: 12px;
      }
    }
  </style>
</head>

<body>

  <script>
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 90; i++) {
      const star = document.createElement('div');
      star.style.cssText = `
        position:absolute;
        width:${Math.random() * 2 + 0.5}px;
        height:${Math.random() * 2 + 0.5}px;
        border-radius:50%;
        background:white;
        opacity:${Math.random() * 0.6 + 0.3};
        left:${Math.random() * 100}%;
        top:${Math.random() * 55}%;
        filter: blur(${Math.random() * 0.8}px);
      `;
      starsEl.appendChild(star);
    }
  </script>
